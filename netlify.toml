[build]
  command   = "npm run build:netlify"
  publish   = "dist-netlify"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every URL serves index.html so TanStack Router handles routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets aggressively (they are content-hashed by Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the HTML shell (it must always be fresh)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache PNG icons — immutable (filenames won't change without a commit)
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache webmanifest for a day (may change between deploys)
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
